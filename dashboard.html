<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Khánh An ERP</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="top-header">
      <div class="page-title">📊 Dashboard</div>
      <div class="header-actions">
        <span style="font-size:13px; color:#757575;">Xin chào, <strong id="header-user"></strong></span>
      </div>
    </header>

    <div class="page-content">

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="filter-group">
          <label>Kỳ báo cáo</label>
          <select id="filter-ky" onchange="applyFilter()">
            <option value="q1">Quý 1 / 2026</option>
            <option value="t1">Tháng 1 / 2026</option>
            <option value="t2">Tháng 2 / 2026</option>
            <option value="t3">Tháng 3 / 2026</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Khu vực</label>
          <select id="filter-kv" onchange="applyFilter()">
            <option value="">Tất cả</option>
            <option value="SG">TP.HCM</option>
            <option value="AG">An Giang</option>
            <option value="CT">Cần Thơ</option>
            <option value="TG">Tiền Giang</option>
            <option value="LA">Long An</option>
            <option value="DN">Đà Nẵng</option>
            <option value="VL">Vĩnh Long</option>
            <option value="DT">Đồng Tháp</option>
          </select>
        </div>
        <div class="filter-group">
          <label>&nbsp;</label>
          <button class="btn-ka btn-ka-outline" onclick="resetFilter()">↺ Đặt lại</button>
        </div>
      </div>

      <!-- KPI CARDS -->
      <div class="stats-grid" id="kpi-grid"></div>

      <!-- CHARTS -->
      <div class="charts-grid">
        <div class="chart-card">
          <h6><span>📈</span> Doanh thu theo tháng</h6>
          <canvas id="chart-month" height="120"></canvas>
        </div>
        <div class="chart-card">
          <h6><span>🗺️</span> Doanh thu theo khu vực</h6>
          <canvas id="chart-region" height="200"></canvas>
        </div>
      </div>

      <div class="charts-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="chart-card">
          <h6><span>🏆</span> Top 5 sản phẩm bán chạy</h6>
          <canvas id="chart-product" height="180"></canvas>
        </div>
        <div class="card" style="margin-bottom:0;">
          <div class="card-header">
            <h6><span>⚠️</span> Công nợ khách hàng lớn nhất</h6>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="ka-table" id="debt-table">
                <thead>
                  <tr>
                    <th>Khách hàng</th>
                    <th>Khu vực</th>
                    <th class="text-right">Công nợ</th>
                  </tr>
                </thead>
                <tbody id="debt-body"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script>
let chartMonth = null, chartRegion = null, chartProduct = null;
let globalData = null;

async function main() {
  const data = await initPage('dashboard');
  if (!data) return;
  globalData = data;
  renderDashboard(data.dashboard);
}

function applyFilter() {
  if (!globalData) return;
  const ky = document.getElementById('filter-ky').value;
  const kv = document.getElementById('filter-kv').value;

  const d = globalData.dashboard;

  // Filter doanh thu theo thang
  let thangData = d.doanhThuTheoThang;
  const kyMap = { t1: 'T1/2026', t2: 'T2/2026', t3: 'T3/2026' };
  if (ky !== 'q1') {
    thangData = thangData.filter(t => t.thang === kyMap[ky]);
  }

  // Filter khu vuc
  let kvData = d.doanhThuTheoKhuVuc;
  if (kv) kvData = kvData.filter(k => k.khuVuc === kv);

  // KPI adjust
  let doanhThu = thangData.reduce((s, t) => s + t.doanhThu, 0);
  if (kv) {
    const kvItem = d.doanhThuTheoKhuVuc.find(k => k.khuVuc === kv);
    doanhThu = kvItem ? kvItem.doanhThu : 0;
  }

  renderKPI({ ...d, doanhThuQuy: doanhThu });
  updateChartMonth(thangData);
  updateChartRegion(kvData);
}

function resetFilter() {
  document.getElementById('filter-ky').value = 'q1';
  document.getElementById('filter-kv').value = '';
  if (globalData) renderDashboard(globalData.dashboard);
}

function renderDashboard(d) {
  renderKPI(d);
  renderDebtTable(d.congNoKhachHang);
  initCharts(d);
}

function renderKPI(d) {
  document.getElementById('kpi-grid').innerHTML = `
    <div class="stat-card green">
      <div class="stat-icon">💰</div>
      <div>
        <div class="stat-label">Doanh thu</div>
        <div class="stat-value">${fmtCurrencyShort(d.doanhThuQuy)}</div>
        <div class="stat-sub">Quý 1 / 2026</div>
      </div>
    </div>
    <div class="stat-card orange">
      <div class="stat-icon">📦</div>
      <div>
        <div class="stat-label">Số thùng bán</div>
        <div class="stat-value">${fmtNumber(d.soThungBan)}</div>
        <div class="stat-sub">thùng (10kg)</div>
      </div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">📋</div>
      <div>
        <div class="stat-label">Công nợ phải thu</div>
        <div class="stat-value">${fmtCurrencyShort(d.congNo)}</div>
        <div class="stat-sub">Tổng khách hàng</div>
      </div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">🏦</div>
      <div>
        <div class="stat-label">Tiền mặt + ngân hàng</div>
        <div class="stat-value">${fmtCurrencyShort(d.tienMat)}</div>
        <div class="stat-sub">Số dư hiện tại</div>
      </div>
    </div>
  `;
}

function renderDebtTable(list) {
  const tbody = document.getElementById('debt-body');
  tbody.innerHTML = list.map(r => `
    <tr>
      <td class="fw-bold">${r.tenKH}</td>
      <td>${getKhuVucLabel(r.khuVuc)}</td>
      <td class="text-right text-danger fw-bold">${fmtCurrency(r.congNo)}</td>
    </tr>
  `).join('');
}

function initCharts(d) {
  // Month chart
  const ctxM = document.getElementById('chart-month').getContext('2d');
  if (chartMonth) chartMonth.destroy();
  chartMonth = new Chart(ctxM, {
    type: 'bar',
    data: {
      labels: d.doanhThuTheoThang.map(t => t.thang),
      datasets: [{
        label: 'Doanh thu (tỷ đồng)',
        data: d.doanhThuTheoThang.map(t => +(t.doanhThu / 1e9).toFixed(2)),
        backgroundColor: '#7dd4e8',
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: v => v + ' tỷ' }
        }
      }
    }
  });

  // Region pie
  const ctxR = document.getElementById('chart-region').getContext('2d');
  if (chartRegion) chartRegion.destroy();
  const colors = ['#1a9ab8','#36bfdc','#1976d2','#7dd4e8','#90e0ef','#ff8f00','#ffa726','#ffcc02'];
  chartRegion = new Chart(ctxR, {
    type: 'doughnut',
    data: {
      labels: d.doanhThuTheoKhuVuc.map(k => getKhuVucLabel(k.khuVuc)),
      datasets: [{
        data: d.doanhThuTheoKhuVuc.map(k => k.doanhThu),
        backgroundColor: colors,
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 8 } },
        tooltip: {
          callbacks: {
            label: ctx => ` ${fmtCurrencyShort(ctx.raw)}`
          }
        }
      }
    }
  });

  // Product bar horizontal
  const ctxP = document.getElementById('chart-product').getContext('2d');
  if (chartProduct) chartProduct.destroy();
  chartProduct = new Chart(ctxP, {
    type: 'bar',
    data: {
      labels: d.topSanPham.map(p => p.tenSP),
      datasets: [{
        label: 'Doanh thu',
        data: d.topSanPham.map(p => +(p.doanhThu / 1e6).toFixed(0)),
        backgroundColor: ['#1a9ab8','#36bfdc','#1976d2','#7dd4e8','#90e0ef'],
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { callback: v => v + 'tr' } }
      }
    }
  });
}

function updateChartMonth(data) {
  if (!chartMonth) return;
  chartMonth.data.labels = data.map(t => t.thang);
  chartMonth.data.datasets[0].data = data.map(t => +(t.doanhThu / 1e9).toFixed(2));
  chartMonth.update();
}

function updateChartRegion(data) {
  if (!chartRegion) return;
  chartRegion.data.labels = data.map(k => getKhuVucLabel(k.khuVuc));
  chartRegion.data.datasets[0].data = data.map(k => k.doanhThu);
  chartRegion.update();
}

main();
</script>
</body>
</html>
