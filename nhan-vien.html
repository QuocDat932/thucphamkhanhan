<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhân viên — Khánh An ERP</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-content">
    <header class="top-header">
      <div class="page-title">👥 Quản lý nhân viên</div>
      <div class="header-actions">
        <button class="btn-ka btn-ka-primary" onclick="openModal('modal-add')">
          + Thêm nhân viên
        </button>
      </div>
    </header>

    <div class="page-content">

      <!-- FILTER -->
      <div class="filter-bar">
        <div class="filter-group">
          <label>Tìm kiếm</label>
          <input type="text" id="search" placeholder="Tên, email, SĐT..." oninput="renderTable()" />
        </div>
        <div class="filter-group">
          <label>Vai trò</label>
          <select id="filter-role" onchange="renderTable()">
            <option value="">Tất cả</option>
            <option value="admin">Quản trị viên</option>
            <option value="kinh_doanh">Kinh doanh</option>
            <option value="ke_toan">Kế toán</option>
            <option value="thu_kho">Thủ kho</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Trạng thái</label>
          <select id="filter-status" onchange="renderTable()">
            <option value="">Tất cả</option>
            <option value="active">Hoạt động</option>
            <option value="inactive">Ngưng</option>
          </select>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card">
        <div class="card-header">
          <h6>📋 Danh sách nhân viên / tài khoản</h6>
          <span id="count-label" style="font-size:12px; color:#757575;"></span>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="ka-table">
              <thead>
                <tr>
                  <th>Mã</th>
                  <th>Họ tên</th>
                  <th>Tài khoản</th>
                  <th>Email</th>
                  <th>Điện thoại</th>
                  <th>Vai trò</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ADD/EDIT -->
<div class="modal-overlay" id="modal-add">
  <div class="modal-box">
    <div class="modal-header">
      <h5 id="modal-title">Thêm nhân viên</h5>
      <button class="modal-close" onclick="closeModal('modal-add')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Họ tên <span style="color:red">*</span></label>
          <input type="text" id="f-hoTen" placeholder="Nguyễn Văn A" />
        </div>
        <div class="form-group">
          <label>Tên đăng nhập <span style="color:red">*</span></label>
          <input type="text" id="f-username" placeholder="nguyenvana" />
        </div>
        <div class="form-group">
          <label>Mật khẩu <span style="color:red">*</span></label>
          <input type="password" id="f-password" placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="email@khanhan.vn" />
        </div>
        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" id="f-sdt" placeholder="0901234567" />
        </div>
        <div class="form-group">
          <label>Vai trò <span style="color:red">*</span></label>
          <select id="f-vaiTro">
            <option value="kinh_doanh">Kinh doanh</option>
            <option value="ke_toan">Kế toán</option>
            <option value="thu_kho">Thủ kho</option>
            <option value="admin">Quản trị viên</option>
          </select>
        </div>
        <div class="form-group">
          <label>Trạng thái</label>
          <select id="f-status">
            <option value="active">Hoạt động</option>
            <option value="inactive">Ngưng hoạt động</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ka btn-ka-outline" onclick="closeModal('modal-add')">Hủy</button>
      <button class="btn-ka btn-ka-primary" onclick="saveUser()">💾 Lưu</button>
    </div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box">
    <div class="modal-header">
      <h5>Chi tiết nhân viên</h5>
      <button class="modal-close" onclick="closeModal('modal-detail')">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn-ka btn-ka-outline" onclick="closeModal('modal-detail')">Đóng</button>
      <button class="btn-ka btn-ka-primary" id="btn-edit-from-detail">✏️ Sửa</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>

<script src="assets/js/app.js"></script>
<script>
let allUsers = [];
let editingId = null;

async function main() {
  const data = await initPage('nhan-vien');
  if (!data) return;
  allUsers = JSON.parse(JSON.stringify(data.accounts));
  renderTable();
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const role = document.getElementById('filter-role').value;
  const status = document.getElementById('filter-status').value;

  const filtered = allUsers.filter(u => {
    const matchSearch = !search ||
      u.hoTen.toLowerCase().includes(search) ||
      u.username.toLowerCase().includes(search) ||
      (u.email || '').toLowerCase().includes(search) ||
      (u.soDienThoai || '').includes(search);
    const matchRole = !role || u.vaiTro === role;
    const matchStatus = !status || u.trangThai === status;
    return matchSearch && matchRole && matchStatus;
  });

  document.getElementById('count-label').textContent = `${filtered.length} nhân viên`;

  const tbody = document.getElementById('table-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted" style="padding:32px;">Không có dữ liệu</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(u => `
    <tr>
      <td style="color:#757575; font-size:12px;">${u.id}</td>
      <td class="fw-bold">${u.hoTen}</td>
      <td><code style="background:#f5f5f5; padding:2px 6px; border-radius:4px;">${u.username}</code></td>
      <td>${u.email || '—'}</td>
      <td>${u.soDienThoai || '—'}</td>
      <td>
        <span style="background:#e0f8fc; color:#36bfdc; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:600;">
          ${getVaiTroLabel(u.vaiTro)}
        </span>
      </td>
      <td>${statusBadge(u.trangThai)}</td>
      <td>
        <div class="d-flex gap-8">
          <button class="btn-ka btn-ka-outline btn-ka-sm" onclick="viewDetail('${u.id}')">👁 Xem</button>
          <button class="btn-ka btn-ka-primary btn-ka-sm" onclick="editUser('${u.id}')">✏️</button>
          <button class="btn-ka btn-ka-danger btn-ka-sm" onclick="toggleStatus('${u.id}')">${u.trangThai === 'active' ? '🔒' : '🔓'}</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function viewDetail(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  document.getElementById('detail-body').innerHTML = `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Mã nhân viên</div><div class="fw-bold" style="margin-top:4px;">${u.id}</div></div>
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Họ tên</div><div class="fw-bold" style="margin-top:4px;">${u.hoTen}</div></div>
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Tài khoản</div><div style="margin-top:4px;"><code style="background:#f5f5f5;padding:2px 8px;border-radius:4px;">${u.username}</code></div></div>
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Vai trò</div><div style="margin-top:4px;">${getVaiTroLabel(u.vaiTro)}</div></div>
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Email</div><div style="margin-top:4px;">${u.email || '—'}</div></div>
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Điện thoại</div><div style="margin-top:4px;">${u.soDienThoai || '—'}</div></div>
      <div><div style="font-size:11px;color:#757575;font-weight:700;text-transform:uppercase;">Trạng thái</div><div style="margin-top:4px;">${statusBadge(u.trangThai)}</div></div>
    </div>
  `;
  document.getElementById('btn-edit-from-detail').onclick = () => { closeModal('modal-detail'); editUser(id); };
  openModal('modal-detail');
}

function editUser(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Sửa nhân viên';
  document.getElementById('f-hoTen').value = u.hoTen;
  document.getElementById('f-username').value = u.username;
  document.getElementById('f-password').value = '';
  document.getElementById('f-email').value = u.email || '';
  document.getElementById('f-sdt').value = u.soDienThoai || '';
  document.getElementById('f-vaiTro').value = u.vaiTro;
  document.getElementById('f-status').value = u.trangThai;
  openModal('modal-add');
}

function saveUser() {
  const hoTen = document.getElementById('f-hoTen').value.trim();
  const username = document.getElementById('f-username').value.trim();
  if (!hoTen || !username) { showToast('Vui lòng nhập đầy đủ thông tin bắt buộc.', 'error'); return; }

  if (editingId) {
    const idx = allUsers.findIndex(x => x.id === editingId);
    if (idx >= 0) {
      allUsers[idx].hoTen = hoTen;
      allUsers[idx].username = username;
      allUsers[idx].email = document.getElementById('f-email').value.trim();
      allUsers[idx].soDienThoai = document.getElementById('f-sdt').value.trim();
      allUsers[idx].vaiTro = document.getElementById('f-vaiTro').value;
      allUsers[idx].trangThai = document.getElementById('f-status').value;
    }
    showToast('Cập nhật nhân viên thành công!');
  } else {
    const newId = 'U' + String(allUsers.length + 1).padStart(3, '0');
    allUsers.push({
      id: newId,
      username,
      password: document.getElementById('f-password').value || '123456',
      hoTen,
      email: document.getElementById('f-email').value.trim(),
      soDienThoai: document.getElementById('f-sdt').value.trim(),
      vaiTro: document.getElementById('f-vaiTro').value,
      trangThai: document.getElementById('f-status').value,
    });
    showToast('Thêm nhân viên thành công!');
  }

  editingId = null;
  closeModal('modal-add');
  renderTable();
}

function toggleStatus(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  u.trangThai = u.trangThai === 'active' ? 'inactive' : 'active';
  showToast(`Đã ${u.trangThai === 'active' ? 'kích hoạt' : 'vô hiệu hóa'} tài khoản ${u.hoTen}.`);
  renderTable();
}

// Reset form khi mở modal thêm mới
document.getElementById('modal-add').addEventListener('click', function(e) {
  if (e.target === this) closeModal('modal-add');
});
document.getElementById('modal-detail').addEventListener('click', function(e) {
  if (e.target === this) closeModal('modal-detail');
});

document.querySelector('.btn-ka-primary[onclick*="modal-add"]')?.addEventListener('click', () => {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Thêm nhân viên';
  ['f-hoTen','f-username','f-password','f-email','f-sdt'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-vaiTro').value = 'kinh_doanh';
  document.getElementById('f-status').value = 'active';
});

main();
</script>
</body>
</html>
