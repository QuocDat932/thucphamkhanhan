<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Khánh An ERP</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-circle">🌿</div>
      <h2>Khánh An ERP</h2>
      <p>Hệ thống quản lý — Thực phẩm chay</p>
    </div>

    <div id="error-msg" style="display:none; background:#ffebee; color:#c62828; border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:13px;"></div>

    <div style="margin-bottom:14px;">
      <label class="form-label" style="display:block; margin-bottom:6px; font-size:13px;">Tên đăng nhập</label>
      <input
        type="text"
        id="username"
        placeholder="Nhập tên đăng nhập"
        style="width:100%; padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:6px; font-size:14px; outline:none; transition:border-color 0.15s;"
        onfocus="this.style.borderColor='#36bfdc'"
        onblur="this.style.borderColor='#e0e0e0'"
      />
    </div>

    <div style="margin-bottom:20px;">
      <label class="form-label" style="display:block; margin-bottom:6px; font-size:13px;">Mật khẩu</label>
      <input
        type="password"
        id="password"
        placeholder="Nhập mật khẩu"
        style="width:100%; padding:10px 12px; border:1.5px solid #e0e0e0; border-radius:6px; font-size:14px; outline:none; transition:border-color 0.15s;"
        onfocus="this.style.borderColor='#36bfdc'"
        onblur="this.style.borderColor='#e0e0e0'"
        onkeydown="if(event.key==='Enter') doLogin()"
      />
    </div>

    <button class="btn-login" onclick="doLogin()">Đăng nhập</button>

    <div class="login-hint">
      <strong>Tài khoản demo:</strong><br/>
      admin / admin123 &nbsp;|&nbsp; kinhdoanh1 / kd123<br/>
      ketoan1 / kt123 &nbsp;|&nbsp; kho1 / kho123
    </div>
  </div>
</div>

<script>
  // If already logged in, redirect
  if (sessionStorage.getItem('ka_user')) {
    window.location.href = 'dashboard.html';
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!username || !password) {
      errEl.textContent = 'Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu.';
      errEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('data/demo-data.json');
      const data = await res.json();
      const user = data.accounts.find(
        a => a.username === username && a.password === password && a.trangThai === 'active'
      );

      if (!user) {
        errEl.textContent = 'Tên đăng nhập hoặc mật khẩu không đúng.';
        errEl.style.display = 'block';
        return;
      }

      sessionStorage.setItem('ka_user', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    } catch (e) {
      errEl.textContent = 'Không thể tải dữ liệu. Hãy kiểm tra lại kết nối.';
      errEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
